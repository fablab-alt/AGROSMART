# ============================================================
# AgroSmart CI — Docker Compose pour développement local
#
# Usage :
#   docker compose -f docker-compose.dev.yml --env-file .env.docker up --build -d
#   docker compose -f docker-compose.dev.yml --env-file .env.docker logs -f
#   docker compose -f docker-compose.dev.yml --env-file .env.docker down
#
# Accès :
#   Frontend  → http://localhost:3603
#   Backend   → http://localhost:3600/api/v1
#   MySQL     → localhost:3307 (hôte) — port décalé pour ne pas conflit avec un MySQL local
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL 8.x — base de données locale
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: agrosmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-agrosmart}
      MYSQL_USER:          ${MYSQL_USER:-agrosmart}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-agrosmart123}
      TZ:                  ${TZ:-Africa/Abidjan}
    ports:
      - "3307:3306"   # Exposé sur 3307 côté hôte pour éviter conflits
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-agrosmart}", "--password=${MYSQL_PASSWORD:-agrosmart123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ----------------------------------------------------------
  # Backend Node.js / Express
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: agrosmart-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV:        production
      PORT:            ${BACKEND_PORT:-3600}
      DATABASE_URL:    ${DATABASE_URL}
      DB_HOST:         mysql
      DB_PORT:         "3306"
      DB_NAME:         ${DB_NAME:-agrosmart}
      DB_USER:         ${DB_USER:-agrosmart}
      DB_PASSWORD:     ${DB_PASSWORD:-agrosmart123}
      DB_SSL:          "false"
      JWT_SECRET:      ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:  ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CORS_ORIGIN:     ${CORS_ORIGIN}
      ALLOW_LOCALHOST_CORS: "true"
      LOG_LEVEL:       ${LOG_LEVEL:-info}
      LOG_DIR:         ./logs
      RATE_LIMIT_WINDOW_MS:   ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-2000}
      TZ:              ${TZ:-Africa/Abidjan}
      RUN_SEED:        ${RUN_SEED:-true}
      WEATHER_API_URL: ${WEATHER_API_URL:-https://meteo.voisilab.online/api}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      SMTP_HOST:       ${SMTP_HOST:-}
      SMTP_PORT:       ${SMTP_PORT:-587}
      SMTP_USER:       ${SMTP_USER:-}
      SMTP_PASSWORD:   ${SMTP_PASSWORD:-}
      EMAIL_FROM:      ${EMAIL_FROM:-noreply@agrosmart.ci}
      TWILIO_ACCOUNT_SID:   ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:    ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER:  ${TWILIO_PHONE_NUMBER:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      AI_SERVICE_URL:  ${AI_SERVICE_URL:-}
      IOT_SERVICE_URL: ${IOT_SERVICE_URL:-}
      IOT_GATEWAY_SECRET: ${IOT_GATEWAY_SECRET:-}
      LORA_NETWORK_KEY: ${LORA_NETWORK_KEY:-}
    ports:
      - "${BACKEND_PORT:-3600}:3600"
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_logs:/app/backend/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3600/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # Frontend Next.js (standalone)
  # ----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
      args:
        NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-http://localhost:3600/api/v1}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3600}
    container_name: agrosmart-frontend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV:               production
      PORT:                   ${FRONTEND_PORT:-3603}
      HOSTNAME:               "0.0.0.0"
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-http://localhost:3600/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3600}
      TZ:                     ${TZ:-Africa/Abidjan}
    ports:
      - "${FRONTEND_PORT:-3603}:3603"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  app-network:
    driver: bridge
