services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: agrosmart-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ALLOW_DEMO_START: 'false'
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ALLOW_LOCALHOST_CORS: 'false'
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: ${LOG_DIR}
      LOG_FILE: ${LOG_FILE}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      APP_VERSION: ${APP_VERSION}
      WEATHER_API_URL: ${WEATHER_API_URL}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      IOT_SERVICE_URL: ${IOT_SERVICE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      IOT_GATEWAY_SECRET: ${IOT_GATEWAY_SECRET}
      LORA_NETWORK_KEY: ${LORA_NETWORK_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      TZ: ${TZ}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "${BACKEND_PORT}"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_logs:/app/backend/logs
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + (process.env.PORT||3600) + '/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.agrosmart-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.agrosmart-backend.entrypoints=websecure"
      - "traefik.http.routers.agrosmart-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.agrosmart-backend.loadbalancer.server.port=${BACKEND_PORT}"

  redis:
    image: redis:7-alpine
    container_name: agrosmart-redis
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    container_name: agrosmart-frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      TZ: ${TZ}
    expose:
      - "${FRONTEND_PORT}"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + (process.env.PORT||3603) + '/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.agrosmart-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.agrosmart-frontend.entrypoints=websecure"
      - "traefik.http.routers.agrosmart-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.agrosmart-frontend.loadbalancer.server.port=${FRONTEND_PORT}"

volumes:
  backend_uploads:
  backend_logs:

networks:
  app-network:
    driver: bridge
  traefik-network:
    external: true
